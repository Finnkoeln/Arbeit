<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Arbeitszeit</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg: #FAF8F3;
    --surface: #FFFFFF;
    --surface-2: #F2EEE3;
    --border: #E2DCC8;
    --border-strong: #C9C0A3;
    --text: #2B2A24;
    --text-muted: #6B6757;
    --text-faint: #9A9580;
    --accent: #2F6B4F;
    --accent-strong: #1E4A35;
    --accent-soft: #E2EEE5;
    --warn: #B5562B;
    --warn-soft: #F6E6DB;
    --danger: #A23B2E;
    --danger-soft: #F5E2DD;
    --info-soft: #E7EDF5;
    --info: #2E4F7A;
    --radius-s: 6px;
    --radius-m: 10px;
    --radius-l: 16px;
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg: #1B1A16;
      --surface: #232019;
      --surface-2: #2B2820;
      --border: #3A362A;
      --border-strong: #4D4836;
      --text: #EDE9DD;
      --text-muted: #B0AB94;
      --text-faint: #7D7964;
      --accent: #6FBF95;
      --accent-strong: #8FD4AE;
      --accent-soft: #233830;
      --warn: #E0995F;
      --warn-soft: #3A2C1E;
      --danger: #E08577;
      --danger-soft: #3A241E;
      --info-soft: #20283A;
      --info: #7FA3D6;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.5;
  }
  #app{max-width:920px;margin:0 auto;padding:0 20px 80px;}

  /* Header */
  .topbar{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:32px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px;
    gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand h1{font-family:var(--font-display);font-size:28px;font-weight:600;margin:0;letter-spacing:-0.01em;}
  .brand .tag{font-size:12px;color:var(--text-faint);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;}
  .today-pill{font-size:13px;color:var(--text-muted);font-family:var(--font-mono);}

  /* Nav */
  nav.tabs{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid var(--border);}
  nav.tabs button{
    appearance:none;border:none;background:none;cursor:pointer;
    padding:10px 16px;font-size:14px;font-family:var(--font-body);color:var(--text-muted);
    border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;
    transition:color .15s;
  }
  nav.tabs button:hover{color:var(--text);}
  nav.tabs button.active{color:var(--accent-strong);border-bottom-color:var(--accent);font-weight:600;}
  nav.tabs i{font-size:16px;}

  section.view{display:none;}
  section.view.active{display:block;animation:fadein .2s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* Generic */
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-l);
    padding:20px 22px;
  }
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
  .metric{background:var(--surface-2);border-radius:var(--radius-m);padding:14px 16px;}
  .metric .label{font-size:12px;color:var(--text-muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.04em;}
  .metric .value{font-family:var(--font-display);font-size:26px;font-weight:600;margin:0;}
  .metric .value.pos{color:var(--accent-strong);}
  .metric .value.neg{color:var(--danger);}
  .metric .sub{font-size:12px;color:var(--text-faint);margin-top:4px;}

  h2.section-title{font-family:var(--font-display);font-size:19px;font-weight:600;margin:0 0 14px;}
  h3.sub-title{font-size:14px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin:28px 0 12px;}

  label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px;}
  input[type=date], input[type=time], input[type=number], input[type=text], select, textarea{
    width:100%;padding:9px 11px;border:1px solid var(--border-strong);border-radius:var(--radius-s);
    background:var(--surface);color:var(--text);font-family:var(--font-body);font-size:14px;
  }
  textarea{resize:vertical;min-height:60px;font-family:var(--font-body);}
  input:focus, select:focus, textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}

  button.btn{
    appearance:none;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);
    padding:9px 16px;border-radius:var(--radius-s);font-size:14px;font-family:var(--font-body);
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s, transform .1s;
  }
  button.btn:hover{background:var(--surface-2);}
  button.btn:active{transform:scale(0.98);}
  button.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.btn.primary:hover{background:var(--accent-strong);}
  button.btn.danger{color:var(--danger);}
  button.btn.danger:hover{background:var(--danger-soft);}
  button.icon-btn{
    appearance:none;border:none;background:none;cursor:pointer;color:var(--text-faint);
    padding:4px;border-radius:var(--radius-s);display:inline-flex;
  }
  button.icon-btn:hover{color:var(--text);background:var(--surface-2);}

  .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:14px;}
  .form-actions{display:flex;gap:10px;margin-top:6px;}

  table.list{width:100%;border-collapse:collapse;font-size:14px;}
  table.list th{
    text-align:left;font-size:12px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;
    padding:8px 10px;border-bottom:1px solid var(--border);font-weight:500;
  }
  table.list td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
  table.list tr:last-child td{border-bottom:none;}
  .badge{
    display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 9px;border-radius:20px;font-weight:500;
  }
  .badge.work{background:var(--accent-soft);color:var(--accent-strong);}
  .badge.vacation{background:var(--info-soft);color:var(--info);}
  .badge.sick{background:var(--danger-soft);color:var(--danger);}
  .row-note{font-size:12px;color:var(--text-faint);margin-top:2px;display:flex;align-items:center;gap:4px;}

  .empty{
    text-align:center;padding:40px 20px;color:var(--text-faint);font-size:14px;
  }
  .empty i{font-size:28px;display:block;margin-bottom:10px;opacity:.6;}

  /* Calendar */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-header .month-label{font-family:var(--font-display);font-size:18px;font-weight:600;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:11px;color:var(--text-faint);text-align:center;text-transform:uppercase;padding-bottom:4px;}
  .cal-day{
    aspect-ratio:1;border-radius:var(--radius-s);border:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    cursor:pointer;background:var(--surface);position:relative;font-size:13px;padding:2px;
  }
  .cal-day:hover{border-color:var(--border-strong);}
  .cal-day.empty-day{visibility:hidden;}
  .cal-day .num{font-weight:500;}
  .cal-day .dot{width:5px;height:5px;border-radius:50%;}
  .cal-day.is-work{background:var(--accent-soft);}
  .cal-day.is-vacation{background:var(--info-soft);}
  .cal-day.is-sick{background:var(--danger-soft);}
  .cal-day.is-today{border:2px solid var(--accent);}
  .cal-legend{display:flex;gap:16px;margin-top:14px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;}
  .cal-legend span{display:flex;align-items:center;gap:6px;}
  .dot-static{width:8px;height:8px;border-radius:50%;display:inline-block;}

  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

  @media (max-width: 600px){
    nav.tabs{overflow-x:auto;white-space:nowrap;}
    .form-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="brand">
      <h1>Meine Arbeitszeit</h1>
      <span class="tag">Zeiterfassung</span>
    </div>
    <div class="today-pill" id="todayPill"></div>
  </div>

  <nav class="tabs" id="mainNav">
    <button data-view="dashboard" class="active"><i class="ti ti-layout-dashboard"></i>Übersicht</button>
    <button data-view="entry"><i class="ti ti-clock-plus"></i>Eintragen</button>
    <button data-view="calendar"><i class="ti ti-calendar"></i>Kalender</button>
    <button data-view="stats"><i class="ti ti-chart-bar"></i>Statistik</button>
    <button data-view="settings"><i class="ti ti-settings"></i>Einstellungen</button>
  </nav>

  <section class="view active" id="view-dashboard"></section>
  <section class="view" id="view-entry"></section>
  <section class="view" id="view-calendar"></section>
  <section class="view" id="view-stats"></section>
  <section class="view" id="view-settings"></section>

</div>
<script src="app.js"></script>
</body>
</html>
